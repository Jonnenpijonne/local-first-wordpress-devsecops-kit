name: Container Build & Publish

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main
  workflow_run:
    workflows: [DevSecOps CI]
    types: [completed]
    branches: [main]

jobs:
  docker-compose-snapshot:
    runs-on: ubuntu-latest
    name: Docker Compose Stack Snapshot
    if: github.event_name == 'push' || github.event_name == 'workflow_run'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate docker-compose configuration
        run: |
          docker compose config --quiet
          echo "✓ docker-compose.yml is valid"

      - name: Build stack from docker-compose
        run: |
          docker compose build
          echo "✓ Stack images built successfully"

      - name: Create docker-compose snapshot
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker compose config > docker-compose.snapshot.json
          echo "Snapshot created"

      - name: Upload compose snapshot as artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: docker-compose-snapshot
          path: docker-compose.snapshot.json
          retention-days: 30

      - name: Stack build summary
        run: |
          echo "✓ Docker Compose stack built and validated"
          echo "✓ Services: WordPress, MariaDB, Mailpit"
          echo "✓ Configuration snapshot created"
