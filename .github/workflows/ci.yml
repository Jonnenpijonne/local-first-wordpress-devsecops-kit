name: DevSecOps CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  schedule:
    - cron: "0 2 * * 0"

jobs:
  docker-compose-validate:
    runs-on: ubuntu-latest
    name: Validate Docker Compose
    steps:
      - uses: actions/checkout@v4
      - name: Validate syntax
        run: docker compose config --quiet

  secret-scan:
    runs-on: ubuntu-latest
    name: Secret Scanning
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan with TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
        continue-on-error: true

  shell-lint:
    runs-on: ubuntu-latest
    name: Shell Script Linting
    steps:
      - uses: actions/checkout@v4
      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Lint scripts
        run: |
          if find scripts -type f -name "*.sh" 2>/dev/null | grep -q .; then
            find scripts -type f -name "*.sh" | xargs shellcheck || true
          else
            echo "No shell scripts found"
          fi

  python-lint:
    runs-on: ubuntu-latest
    name: Python Script Validation
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: Install tools
        run: pip install pylint black isort flake8
      - name: Check Python
        run: |
          if find scripts -type f -name "*.py" 2>/dev/null | grep -q .; then
            find scripts -type f -name "*.py" | xargs black --check || true
          else
            echo "No Python scripts found"
          fi

  env-validate:
    runs-on: ubuntu-latest
    name: Environment Configuration
    steps:
      - uses: actions/checkout@v4
      - name: Validate env
        run: |
          test -f .env.example && echo "env.example exists"
          grep -q "^.env" .gitignore && echo "env protected"

  docker-build:
    runs-on: ubuntu-latest
    name: Docker Build Validation
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build images
        run: |
          docker compose build wordpress
          docker compose build db

  docker-runtime:
    runs-on: ubuntu-latest
    name: Docker Runtime Validation
    steps:
      - uses: actions/checkout@v4
      - name: Start stack
        run: docker compose up -d
      - name: Wait
        run: sleep 5
      - name: Status
        run: docker compose ps
      - name: Stop
        if: always()
        run: docker compose down || true

  docs-validate:
    runs-on: ubuntu-latest
    name: Documentation Quality
    steps:
      - uses: actions/checkout@v4
      - name: Check files
        run: |
          test -f README.md && echo "README OK"
          test -d docs && echo "docs OK"

  summary:
    runs-on: ubuntu-latest
    name: CI Summary
    needs:
      - docker-compose-validate
      - secret-scan
      - shell-lint
      - python-lint
      - env-validate
      - docker-build
      - docker-runtime
      - docs-validate
    if: always()
    steps:
      - name: Check results
        run: echo "CI complete"
