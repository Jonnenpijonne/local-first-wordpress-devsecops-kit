name: DevSecOps CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  schedule:
    - cron: "0 2 * * 0"

jobs:
  docker-compose-validate:
    runs-on: ubuntu-latest
    name: Validate Docker Compose
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Validate docker-compose.yml syntax
        run: |
          docker compose config --quiet
          echo "Docker Compose is valid"

  secret-scan:
    runs-on: ubuntu-latest
    name: Secret Scanning
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug

  shell-lint:
    runs-on: ubuntu-latest
    name: Shell Script Linting
    steps:
      - uses: actions/checkout@v4
      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Lint shell scripts
        run: |
          find scripts -type f -name "*.sh" 2>/dev/null | while read file; do
            shellcheck "$file" || true
          done

  python-lint:
    runs-on: ubuntu-latest
    name: Python Script Validation
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: Install linting tools
        run: pip install pylint black isort flake8
      - name: Check Python formatting
        run: |
          find scripts -type f -name "*.py" 2>/dev/null | while read file; do
            black --check "$file" || true
          done

  env-validate:
    runs-on: ubuntu-latest
    name: Environment Configuration
    steps:
      - uses: actions/checkout@v4
      - name: Check .env.example exists
        run: test -f .env.example && echo "env file exists"
      - name: Verify .env is gitignored
        run: grep -q "^.env" .gitignore && echo "env is protected"

  docker-build:
    runs-on: ubuntu-latest
    name: Docker Build Validation
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build WordPress image
        run: docker compose build wordpress
      - name: Build MariaDB image
        run: docker compose build db

  docker-runtime:
    runs-on: ubuntu-latest
    name: Docker Runtime Validation
    steps:
      - uses: actions/checkout@v4
      - name: Start stack
        run: docker compose up -d
      - name: Wait for services
        run: sleep 10
      - name: Check containers
        run: docker compose ps
      - name: Cleanup
        if: always()
        run: docker compose down

  docs-validate:
    runs-on: ubuntu-latest
    name: Documentation Quality
    steps:
      - uses: actions/checkout@v4
      - name: Check README
        run: test -f README.md && echo "README exists"
      - name: Check docs directory
        run: test -d docs && echo "docs directory exists"

  governance-check:
    runs-on: ubuntu-latest
    name: Governance Checklist
    steps:
      - uses: actions/checkout@v4
      - name: Check governance files
        run: test -d docs/governance && echo "governance docs present"

  summary:
    runs-on: ubuntu-latest
    name: CI Summary
    needs:
      - docker-compose-validate
      - secret-scan
      - shell-lint
      - python-lint
      - env-validate
      - docker-build
      - docker-runtime
      - docs-validate
      - governance-check
    if: always()
    steps:
      - name: Report status
        run: echo "CI pipeline complete"
      - name: Fail if needed
        if: contains(needs.*.result, 'failure')
        run: exit 1
