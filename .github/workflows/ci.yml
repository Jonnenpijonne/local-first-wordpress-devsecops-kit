name: DevSecOps CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  schedule:
    - cron: '0 2 * * 0'

jobs:
  docker-compose-validate:
    runs-on: ubuntu-latest
    name: Validate Docker Compose
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate docker-compose.yml syntax
        run: |
          docker compose config --quiet
          echo "✓ docker-compose.yml is valid"

      - name: Check service definitions
        run: |
          docker compose config | grep -E "services:|wordpress:|db:|mailpit:" && echo "✓ All expected services defined"

  secret-scan:
    runs-on: ubuntu-latest
    name: Secret Scanning
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --json

      - name: Custom sensitive pattern scan
        run: |
          set +e
          FOUND=0
          
          echo "Scanning for common secrets..."
          grep -RInE \
            'password.*=.*["\047]|secret.*=.*["\047]|token.*=.*["\047]|PRIVATE KEY|sk_live|smtp_pass|license_key|api[_-]?key.*=.*["\047]' \
            . \
            --exclude-dir=.git \
            --exclude-dir=node_modules \
            --exclude-dir=vendor \
            --exclude="*.md" \
            --exclude="CHANGELOG*" || FOUND=$?
          
          if [ $FOUND -eq 0 ]; then
            echo "⚠ WARNING: Potential secrets found. Review manually."
            exit 1
          fi
          
          echo "✓ No obvious secrets detected"

  shell-lint:
    runs-on: ubuntu-latest
    name: Shell Script Linting
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Lint all shell scripts
        run: |
          echo "Linting shell scripts..."
          find scripts -type f -name "*.sh" | while read file; do
            echo "Checking: $file"
            shellcheck -x "$file" || exit 1
          done
          echo "✓ All shell scripts pass linting"

  python-lint:
    runs-on: ubuntu-latest
    name: Python Script Validation
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install linting tools
        run: |
          pip install pylint black isort flake8

      - name: Check Python formatting
        run: |
          find scripts -type f -name "*.py" | while read file; do
            echo "Checking: $file"
            black --check "$file" || true
            isort --check-only "$file" || true
            flake8 "$file" || true
            pylint "$file" --disable=all --enable=E,F || true
          done

  env-validate:
    runs-on: ubuntu-latest
    name: Environment Configuration
    steps:
      - uses: actions/checkout@v4

      - name: Check .env.example exists
        run: |
          [ -f .env.example ] && echo "✓ .env.example exists"

      - name: Validate .env structure
        run: |
          echo "Checking .env.example format..."
          grep -E "^[A-Z_]+=" .env.example | wc -l
          echo "✓ Environment variables defined"

      - name: Verify .env is in .gitignore
        run: |
          grep -q "^.env$" .gitignore && echo "✓ .env is gitignored"
          grep -q "^.env.local" .gitignore || grep -q "^.env\*" .gitignore && echo "✓ Local .env variants protected"

  docker-build:
    runs-on: ubuntu-latest
    name: Docker Build Validation
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build WordPress image locally
        run: |
          docker compose build wordpress
          echo "✓ WordPress image builds successfully"

      - name: Build MariaDB with config
        run: |
          docker compose build db
          echo "✓ MariaDB image configuration valid"

  docker-runtime:
    runs-on: ubuntu-latest
    name: Docker Runtime Validation
    steps:
      - uses: actions/checkout@v4

      - name: Start stack
        timeout-minutes: 5
        run: |
          docker compose up -d
          echo "Stack started, waiting for health checks..."
          sleep 10

      - name: Check container status
        run: |
          docker compose ps
          echo "✓ Services running"

      - name: Check database health
        run: |
          docker compose exec -T db mariadb-admin ping -h localhost -uroot -proot || true
          echo "✓ Database health check completed"

      - name: View logs on failure
        if: failure()
        run: docker compose logs --tail=50

      - name: Cleanup
        if: always()
        run: |
          docker compose down
          echo "✓ Stack cleaned up"

  docs-validate:
    runs-on: ubuntu-latest
    name: Documentation Quality
    steps:
      - uses: actions/checkout@v4

      - name: Check README exists
        run: [ -f README.md ] && echo "✓ README.md present"

      - name: Check docs directory structure
        run: |
          ls docs/ && echo "✓ docs/ directory exists"

  governance-check:
    runs-on: ubuntu-latest
    name: Governance Checklist
    steps:
      - uses: actions/checkout@v4

      - name: Verify governance templates
        run: |
          echo "Checking governance and evidence templates..."
          files=(
            "docs/privacy/DATA_ANONYMIZATION_GUIDE.md"
            "docs/governance/AI_BOUNDARY_MODEL.md"
            "docs/evidence/ANONYMIZATION_LOG_TEMPLATE.md"
          )
          
          for file in "${files[@]}"; do
            if [ -f "$file" ]; then
              echo "✓ $file exists"
            else
              echo "ℹ Missing optional: $file"
            fi
          done

  summary:
    runs-on: ubuntu-latest
    name: CI Summary
    needs:
      - docker-compose-validate
      - secret-scan
      - shell-lint
      - python-lint
      - env-validate
      - docker-build
      - docker-runtime
      - docs-validate
      - governance-check
    if: always()
    steps:
      - name: Check job statuses
        run: |
          echo "✓ All CI checks completed"

      - name: Fail if any job failed
        if: contains(needs.*.result, 'failure')
        run: |
          echo "❌ One or more CI checks failed"
          exit 1
